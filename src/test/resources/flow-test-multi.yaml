flowrunner:
  flow:
    dimensions:
      - key: environment
        name: Environment
        required: true
        children:
          - key: application
            name: Application
            required: true
            children:
              - key: channel
                name: Channel
                required: false
    configuration:
      environment:
        - dev:
            metadata:
              host: localhost
              port: 8080
            application:
              - customer:
                  name: Customer
                  channel:
                    - WEB:
                        name: Web
                    - MOBILE:
                        name: Mobile
              - retailer:
                  name: Retailer
        - prod:
            metadata:
              host: prod.flowrunner.dev
              port: 443
            application:
              - customer:
                  name: Customer
                  channel:
                    - WEB:
                        name: Web
