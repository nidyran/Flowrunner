flowrunner:
  flow:
    dimensions:
      - key: environment
        name: Environment
        required: true
        children:
          - key: application
            name: Application
            required: true
            children:
              - key: channel
                name: Channel
                required: false
    configuration:
      environment:
        - dev:
            application:
              - customer:
                  name: Customer
                  channel:
                    - WEB:
                        name: Web
        - prod:
            metadata:
              host: prod.flowrunner.dev
