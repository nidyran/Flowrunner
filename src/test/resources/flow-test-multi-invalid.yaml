flowrunner:
  flow:
    dimensions:
      - key: environment
        name: Environment
        required: true
        children:
          - key: application
            name: Application
            required: true
            children:
              - key: channel
                name: Channel
                required: false
    configuration:
      - dimension: environment
        key: dev
        children:
          - dimension: application
            key: customer
            name: Customer
            children:
              - dimension: channel
                key: WEB
                name: Web
      - dimension: environment
        key: prod
        metadata:
          host: prod.flowrunner.dev
