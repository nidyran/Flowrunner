spring:
  application:
    name: flowrunner

flowrunner:
  flow:
    dimensions:
      - key: environment
        name: Environment
        defaultValue: local
        required: true
        children:
          - key: application
            name: Application
            required: true
            children:
              - key: channel
                name: Channel
                defaultValue: Web
                required: false
    configuration:
      - dimension: environment
        key: dev
        metadata: #<- A map of key value pairs
          host: localhost
          port: 8080
        children:
          - dimension: application
            key: customer
            name: Customer
            metadata: #<- A map of key value pairs
              host: localhost
              port: 8080
            children:
              - dimension: channel
                key: WEB
                name: Web
                metadata: #<- A map of key value pairs
                  host: localhost
                  port: 8080
