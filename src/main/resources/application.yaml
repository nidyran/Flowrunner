spring:
  application:
    name: flowrunner

flowrunner:
  flow:
    dimensions:
      - key: application
        name: Application
        required: true
        allowedValues:
          - Customer
          - Backoffice
          - Customer Service App
      - key: environment
        name: Environment
        defaultValue: Dev
        required: true
        allowedValues:
          - Local stack
          - Dev
          - UAT
      - key: channel
        name: Channel
        defaultValue: Web
        required: false
