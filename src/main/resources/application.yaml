spring:
  application:
    name: flowrunner

flowrunner:
  flow:
    dimensions:
      - key: environment
        name: Environment
        defaultValue: local
        required: true
        children:
          - key: application
            name: Application
            required: true
            children:
              - key: channel
                name: Channel
                defaultValue: Web
                required: false
    configuration:
      environment:
        - dev:
            properties: #<- A map key value pairs
              host: localhost
              port: 8080
            application:
              - customer:
                  name: Customer
                  properties: #<- A map key value pairs
                    host: localhost
                    port: 8080
                  channel:
                    - WEB:
                        name: Web
                        properties: #<- A map key value pairs
                          host: localhost
                          port: 8080
